version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: bills_postgres
    restart: always
    environment:
      POSTGRES_USER: bills_user
      POSTGRES_PASSWORD: bills_password
      POSTGRES_DB: bills_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
